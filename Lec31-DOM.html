<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM learning</title>
</head>
<body>
    <div class="bg-black">
        <h1 class="heading">DOM Learning</h1>
        <p>This is paragraph</p>
    </div>
</body>
</html>

<!-- DOM = Document Object Model
document -> window -> html -> head, body.
head -> title, meta
title -> text node 
meta -> attribute
body -> div -> attribute, h1, p
h1 -> attribute, text node
p -> text node -->
